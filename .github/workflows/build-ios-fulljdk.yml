name: Build full-JDK OpenJDK-Mobile (Zero) for iOS

# Produces a full multi-module iOS JDK (Zero interpreter, no JIT) for running the
# lean Suwayomi server on-device. Pinned to a JDK-27 / boot-JDK-25 commit so the
# GA Temurin 25 on the runner boots it cleanly (no bleeding-edge JDK 28).
#
# One `make static-libs-image` yields all modules' native static libs + the full
# modules jimage. We package the full image (jlink trimming needs a host JDK 27 and
# is a size optimization, not required for the gate). Runs on a GitHub macOS runner
# (~100 GB free), so no local disk constraint.

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  CONF: ios-aarch64-zero-release
  # JDK 27, DEFAULT_ACCEPTABLE_BOOT_VERSIONS="25 26 27" — boots with GA Temurin 25.
  MOBILE_REF: dfd62e275c0970f75595f8bfe91eff34923fa896
  BOOT_JAVA: '25'

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 240
    steps:
      - name: Install toolchain
        run: |
          brew install autoconf make
          echo "$(brew --prefix make)/libexec/gnubin" >> "$GITHUB_PATH"
          sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer

      - name: Set up boot JDK ${{ env.BOOT_JAVA }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.BOOT_JAVA }}
          distribution: temurin

      - name: Fetch prebuilt iOS libffi
        run: |
          mkdir -p "$RUNNER_TEMP/support"
          curl -sL -o ffi.zip \
            https://github.com/openjdk-mobile/ios-tools/releases/download/libffi-build/libffi-ios.zip
          unzip -q ffi.zip -d "$RUNNER_TEMP/support"

      - name: Clone openjdk/mobile @ pinned commit
        run: |
          git clone https://github.com/openjdk/mobile.git mobile
          cd mobile
          git checkout "$MOBILE_REF"
          curl -sL -o src/hotspot/os/bsd/symbol_keeper.cpp \
            https://raw.githubusercontent.com/openjdk-mobile/ios-tools/main/openjdk-ext/src/hotspot/symbol_keeper.cpp

      - name: Configure (iOS arm64, Zero)
        run: |
          cd mobile
          SUPPORT="$RUNNER_TEMP/support"
          bash configure \
            --with-conf-name=${CONF} \
            --disable-warnings-as-errors \
            --openjdk-target=aarch64-macos-ios \
            --with-sysroot="$(xcrun --sdk iphoneos --show-sdk-path)" \
            --with-libffi-include="$(realpath "$SUPPORT/include/ffi")" \
            --with-libffi-lib="$(realpath "$SUPPORT")" \
            --with-cups-include="$(xcrun --sdk macosx --show-sdk-path)/usr/include"

      - name: Build static-libs-image (all modules + native static libs)
        run: |
          cd mobile
          make LOG=info CONF=${CONF} static-libs-image
          echo "---- static libs ----"; ls -la build/${CONF}/images/static-libs/lib || true

      - name: Build macOS host JDK (signature-matched jmod/jlink — the ios-tools recipe)
        run: |
          cd mobile
          # symbol_keeper.cpp is for the static iOS build only (refs JIMAGE_*/loadfunctions
          # that don't exist in a normal dynamic macOS build). Remove it for the host build.
          rm -f src/hotspot/os/bsd/symbol_keeper.cpp
          bash configure --with-conf-name=macos-aarch64 --with-boot-jdk="$JAVA_HOME" \
            --disable-warnings-as-errors
          make LOG=info CONF=macos-aarch64 jdk-image
          ls -la build/macos-aarch64/images/jdk/bin/jmod build/macos-aarch64/images/jdk/bin/jlink

      - name: Build the iOS jimage (jmod create --target-platform ios-aarch64 → jlink)
        run: |
          cd mobile
          JMOD=build/macos-aarch64/images/jdk/bin/jmod
          JLINK=build/macos-aarch64/images/jdk/bin/jlink
          chmod +x "$JMOD" "$JLINK"
          MODSRC=build/${CONF}/jdk/modules
          mkdir -p jmods
          # static-libs-image doesn't stamp a module version → jlink rejects it. Stamp one.
          VER=$(grep -oE 'JAVA_VERSION="[^"]+"' build/macos-aarch64/images/jdk/release | sed 's/.*="//;s/"//' | grep -oE '^[0-9]+(\.[0-9]+)*')
          [ -z "$VER" ] && VER=26
          echo "stamping module version: $VER"
          # class-only jmod per module (the jimage is class data; native is the static libs)
          for m in "$MODSRC"/*/; do n=$(basename "$m"); \
            "$JMOD" create --class-path "$m" --module-version "$VER" --target-platform ios-aarch64 "jmods/$n.jmod" 2>/dev/null || echo "skip $n"; done
          echo "jmods created: $(ls jmods | wc -l)"
          MODS="java.base,java.sql,java.naming,java.management,java.prefs,java.security.jgss,jdk.unsupported,jdk.zipfs,jdk.crypto.ec"
          "$JLINK" --module-path jmods --add-modules "$MODS" \
            --output iosrt --no-header-files --no-man-pages --strip-debug 2>&1 | tail -8
          ls -la iosrt/lib/modules && echo "JIMAGE_TRIM=$(pwd)/iosrt/lib/modules" >> "$GITHUB_ENV"
          # also a full image (all modules) as a fallback
          "$JLINK" --module-path jmods --add-modules ALL-MODULE-PATH \
            --output iosrt-full --no-header-files --no-man-pages --strip-debug 2>&1 | tail -3 || true
          [ -f iosrt-full/lib/modules ] && echo "JIMAGE_FULL=$(pwd)/iosrt-full/lib/modules" >> "$GITHUB_ENV" || true

      - name: Generate nm-based exported-symbols list (clean keeper for the app link)
        run: |
          cd mobile
          OUT="$GITHUB_WORKSPACE/ios-jdk-out"; mkdir -p "$OUT"
          LIBDIR=build/${CONF}/images/static-libs/lib
          : > "$OUT/exported_symbols_list.txt"
          find "$LIBDIR" -name '*.a' -print0 | while IFS= read -r -d '' a; do
            nm "$a" 2>/dev/null | grep -E ' T _(Java_|JNI_OnLoad)' | awk '{print $3}'
          done | sort -u >> "$OUT/exported_symbols_list.txt"
          echo "symbols kept: $(wc -l < "$OUT/exported_symbols_list.txt")"

      - name: Diagnose build output layout
        run: |
          cd mobile
          echo "==== build/${CONF} top ===="; ls -la build/${CONF} || true
          echo "==== jdk/ ===="; ls -la build/${CONF}/jdk || true
          echo "==== jdk/lib (jimage?) ===="; ls -la build/${CONF}/jdk/lib 2>/dev/null | head || true
          echo "==== jdk/modules (exploded?) ===="; ls build/${CONF}/jdk/modules 2>/dev/null | head -30 || true
          echo "==== static-libs ===="; find build/${CONF} -path '*static-libs*' -name '*.a' 2>/dev/null | head
          echo "==== any jimage anywhere ===="; find build/${CONF} -name modules -type f 2>/dev/null | head

      - name: Package full JDK (modules + static libs + headers) — path-robust
        run: |
          cd mobile
          OUT="$GITHUB_WORKSPACE/ios-jdk-out"
          mkdir -p "$OUT/static-libs"
          # static libs (all *.a from the static-libs image)
          find build/${CONF} -path '*static-libs*' -name '*.a' -exec cp {} "$OUT/static-libs/" \;
          echo "static libs: $(ls "$OUT/static-libs" | wc -l)"
          mkdir -p "$OUT/runtime/lib"
          # jimages produced by the build's own jlink (signature matches the iOS libjvm)
          [ -n "$JIMAGE_TRIM" ] && [ -f "$JIMAGE_TRIM" ] && cp "$JIMAGE_TRIM" "$OUT/runtime/lib/modules-trim" && echo "packaged trimmed jimage"
          [ -n "$JIMAGE_FULL" ] && [ -f "$JIMAGE_FULL" ] && cp "$JIMAGE_FULL" "$OUT/runtime/lib/modules-full" && echo "packaged full jimage"
          # modules: prefer a jimage if present, else the exploded module tree
          if [ -f build/${CONF}/jdk/lib/modules ]; then
            cp build/${CONF}/jdk/lib/modules "$OUT/runtime/lib/modules"
            echo "packaged jimage ($("$JAVA_HOME/bin/jimage" list "$OUT/runtime/lib/modules" | grep -c Module:) modules)"
          elif [ -d build/${CONF}/jdk/modules ]; then
            cp -R build/${CONF}/jdk/modules "$OUT/modules-exploded"
            echo "packaged exploded modules: $(ls "$OUT/modules-exploded" | wc -l) modules"
            ls "$OUT/modules-exploded" | tr '\n' ' '
          else
            echo "ERROR: no modules output found"; find build/${CONF} -name 'modules*' | head; exit 1
          fi
          # conf (java.security etc.) + headers
          for d in build/${CONF}/jdk/conf build/${CONF}/images/jdk/conf; do [ -d "$d" ] && cp -R "$d" "$OUT/conf" && break; done || true
          for d in build/${CONF}/jdk/include build/${CONF}/support/modules_include; do [ -d "$d" ] && cp -R "$d" "$OUT/include" && break; done || true
          du -sh "$OUT"

      - name: Upload iOS full-JDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-fulljdk-zero-jdk27
          path: ios-jdk-out
          retention-days: 30
